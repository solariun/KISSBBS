name: Release

# Triggers:
#   • Push a version tag:  git tag v1.2.3 && git push origin v1.2.3
#   • Manual run from the Actions UI (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.2.3) — used only for manual runs'
        required: false
        default: 'dev'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Helpers ────────────────────────────────────────────────────────────────────
# REF_NAME resolves to the tag (v1.2.3) or the manual version input.
# Each platform job builds the core apps, optionally bt_kiss_bridge, then
# uploads a .tar.gz artifact.  The final "release" job collects everything and
# publishes the GitHub Release.

jobs:
  # ============================================================================
  # Linux x86_64  (native, ubuntu-latest)
  # ============================================================================
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsqlite3-dev pkg-config cmake \
                                  libdbus-1-dev libbluetooth-dev libgtest-dev
          GTEST_SRC=$(ls -d /usr/src/googletest /usr/src/gtest 2>/dev/null | head -1)
          cd "$GTEST_SRC"
          sudo cmake -B build -DCMAKE_BUILD_TYPE=Release
          sudo cmake --build build
          sudo find build -name 'libgtest*.a' -exec cp {} /usr/lib/ \;

      - name: Build core apps
        run: make bbs ax25kiss ax25tnc basic_tool

      - name: Build bt_kiss_bridge
        continue-on-error: true
        run: make bt_kiss_bridge

      - name: Run tests
        run: make test

      - name: Package
        run: |
          REF="${{ github.ref_name || inputs.version }}"
          PKG="ax25-${REF}-linux-x86_64"
          mkdir -p "$PKG"
          cp bbs ax25kiss ax25tnc basic_tool "$PKG"/
          [ -f bt_kiss_bridge ] && cp bt_kiss_bridge "$PKG"/ || true
          [ -f bt_kiss_bridge ] && ln -sf bt_kiss_bridge "$PKG"/ble_kiss_bridge || true
          cp README.md LICENSE "$PKG"/ 2>/dev/null || true
          tar czf "${PKG}.tar.gz" "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: ax25-*-linux-x86_64.tar.gz
          retention-days: 7

  # ============================================================================
  # Linux ARM64  (native, ubuntu-24.04-arm)
  # ============================================================================
  linux-arm64:
    name: Linux ARM64
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libsqlite3-dev pkg-config cmake \
                                  libdbus-1-dev libbluetooth-dev libgtest-dev
          GTEST_SRC=$(ls -d /usr/src/googletest /usr/src/gtest 2>/dev/null | head -1)
          cd "$GTEST_SRC"
          sudo cmake -B build -DCMAKE_BUILD_TYPE=Release
          sudo cmake --build build
          sudo find build -name 'libgtest*.a' -exec cp {} /usr/lib/ \;

      - name: Build core apps
        run: make bbs ax25kiss ax25tnc basic_tool

      - name: Build bt_kiss_bridge
        continue-on-error: true
        run: make bt_kiss_bridge

      - name: Run tests
        run: make test

      - name: Package
        run: |
          REF="${{ github.ref_name || inputs.version }}"
          PKG="ax25-${REF}-linux-arm64"
          mkdir -p "$PKG"
          cp bbs ax25kiss ax25tnc basic_tool "$PKG"/
          [ -f bt_kiss_bridge ] && cp bt_kiss_bridge "$PKG"/ || true
          [ -f bt_kiss_bridge ] && ln -sf bt_kiss_bridge "$PKG"/ble_kiss_bridge || true
          cp README.md LICENSE "$PKG"/ 2>/dev/null || true
          tar czf "${PKG}.tar.gz" "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: ax25-*-linux-arm64.tar.gz
          retention-days: 7

  # ============================================================================
  # Linux ARMhf  (Raspberry Pi 32-bit, cross-compiled on ubuntu-latest)
  #
  # Ubuntu 24.04 Noble: armhf packages live on ports.ubuntu.com, not on
  # security.ubuntu.com (returns 404).  We restrict the existing sources to
  # amd64/i386 with sed, then add a ports.ubuntu.com entry for armhf.
  # ============================================================================
  linux-armhf:
    name: Linux ARMhf (Raspberry Pi)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compiler + deps
        run: |
          sudo dpkg --add-architecture armhf

          # Ubuntu 24.04 uses DEB822 format (ubuntu.sources).
          # Append "Architectures: amd64 i386" after every "Types: deb" line
          # so apt stops trying to fetch armhf from security.ubuntu.com.
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            grep -q '^Architectures:' /etc/apt/sources.list.d/ubuntu.sources || \
              sudo sed -i '/^Types: deb/a Architectures: amd64 i386' \
                  /etc/apt/sources.list.d/ubuntu.sources
          else
            sudo sed -i 's/^deb \(http\)/deb [arch=amd64,i386] \1/' \
                /etc/apt/sources.list 2>/dev/null || true
          fi

          # Add ports.ubuntu.com as the armhf package source.
          printf '%s\n' \
            'deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble           main restricted universe multiverse' \
            'deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-updates   main restricted universe multiverse' \
            'deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-security  main restricted universe multiverse' \
            | sudo tee /etc/apt/sources.list.d/armhf-ports.list > /dev/null

          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            pkg-config cmake \
            libsqlite3-dev:armhf

      - name: Build core apps (cross)
        run: |
          make bbs ax25kiss ax25tnc basic_tool \
            CXX=arm-linux-gnueabihf-g++ \
            PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig

      # Tests cannot run cross-compiled binaries — skip.

      - name: Package
        run: |
          REF="${{ github.ref_name || inputs.version }}"
          PKG="ax25-${REF}-linux-armhf"
          mkdir -p "$PKG"
          cp bbs ax25kiss ax25tnc basic_tool "$PKG"/
          cp README.md LICENSE "$PKG"/ 2>/dev/null || true
          tar czf "${PKG}.tar.gz" "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-armhf
          path: ax25-*-linux-armhf.tar.gz
          retention-days: 7

  # ============================================================================
  # macOS ARM64  (Apple Silicon, macos-latest)
  # ============================================================================
  macos-arm64:
    name: macOS ARM64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install googletest sqlite cmake

      - name: Build core apps
        run: make bbs ax25kiss ax25tnc basic_tool

      - name: Build bt_kiss_bridge
        run: make bt_kiss_bridge

      - name: Run tests
        run: make test

      - name: Package
        run: |
          REF="${{ github.ref_name || inputs.version }}"
          PKG="ax25-${REF}-macos-arm64"
          mkdir -p "$PKG"
          cp bbs ax25kiss ax25tnc basic_tool bt_kiss_bridge "$PKG"/
          ln -sf bt_kiss_bridge "$PKG"/ble_kiss_bridge
          cp README.md LICENSE "$PKG"/ 2>/dev/null || true
          tar czf "${PKG}.tar.gz" "$PKG"

      # Upload individual binaries too — needed by the universal step.
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-bins
          path: |
            bbs
            ax25kiss
            ax25tnc
            basic_tool
            bt_kiss_bridge
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ax25-*-macos-arm64.tar.gz
          retention-days: 7

  # ============================================================================
  # macOS Universal  (arm64 native + x86_64 cross-compiled via -arch x86_64)
  #
  # The macos-13 (Intel) GitHub-hosted runner is no longer reliably available.
  # We cross-compile x86_64 on the Apple Silicon runner instead:
  #   • AppleClang supports -arch x86_64 natively on arm64 hosts.
  #   • The macOS system libsqlite3 is a universal dylib — safe to link from
  #     either arch without the brew arm64-only copy.
  #   • SimpleBLE is rebuilt for x86_64 via -DCMAKE_OSX_ARCHITECTURES=x86_64
  #     (best-effort; bt_kiss_bridge falls back to arm64-only if it fails).
  # ============================================================================
  macos-universal:
    name: macOS Universal
    runs-on: macos-latest
    needs: [macos-arm64]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install googletest sqlite cmake

      - name: Download ARM64 binaries
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-bins
          path: bins/arm64

      - name: Build x86_64 core apps (cross on Apple Silicon)
        run: |
          # Use the macOS system libsqlite3 (universal dylib) instead of the
          # brew arm64-only build so the cross-compile link succeeds.
          make clean
          make bbs ax25kiss ax25tnc basic_tool \
            CXXFLAGS="-std=c++11 -O2 -Wall -Wextra -Wpedantic -arch x86_64" \
            SQLITE_FLAGS="-DHAVE_SQLITE3" \
            SQLITE_LIBS="-lsqlite3"
          mkdir -p bins/x86_64
          cp bbs ax25kiss ax25tnc basic_tool bins/x86_64/

      - name: Build bt_kiss_bridge x86_64 (best-effort)
        continue-on-error: true
        run: |
          cmake -S vendor/simpleble/simpleble \
                -B vendor/simpleble/build-x86_64 \
                -DCMAKE_BUILD_TYPE=Release \
                -DSIMPLEBLE_BUILD_SHARED_LIBS=OFF \
                -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
                -DCMAKE_OSX_ARCHITECTURES=x86_64
          cmake --build vendor/simpleble/build-x86_64 \
                --config Release -j$(sysctl -n hw.logicalcpu)
          make bt_kiss_bridge \
            CXX="clang++ -arch x86_64" \
            BLE_LIB=vendor/simpleble/build-x86_64/lib/libsimpleble.a
          cp bt_kiss_bridge bins/x86_64/

      - name: Create universal binaries with lipo
        run: |
          REF="${{ github.ref_name || inputs.version }}"
          PKG="ax25-${REF}-macos-universal"
          mkdir -p "$PKG"
          chmod +x bins/arm64/* bins/x86_64/* 2>/dev/null || true
          for BIN in bbs ax25kiss ax25tnc basic_tool bt_kiss_bridge; do
            ARM="bins/arm64/$BIN"
            X86="bins/x86_64/$BIN"
            if [ -f "$ARM" ] && [ -f "$X86" ]; then
              lipo -create -output "$PKG/$BIN" "$ARM" "$X86"
              lipo -info "$PKG/$BIN"
            elif [ -f "$ARM" ]; then
              cp "$ARM" "$PKG/$BIN"
              echo "$BIN: arm64 only (x86_64 cross-build skipped)"
            fi
          done
          [ -f "$PKG/bt_kiss_bridge" ] && ln -sf bt_kiss_bridge "$PKG"/ble_kiss_bridge || true
          cp README.md LICENSE "$PKG"/ 2>/dev/null || true
          tar czf "${PKG}.tar.gz" "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: ax25-*-macos-universal.tar.gz
          retention-days: 7

  # ============================================================================
  # Publish GitHub Release
  # ============================================================================
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - linux-x86_64
      - linux-arm64
      - linux-armhf
      - macos-arm64
      - macos-universal
    # Only publish a real release on tag pushes.
    # On workflow_dispatch the job still runs so you can inspect artifacts.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: dist
          merge-multiple: true

      - name: List packages
        run: ls -lh dist/

      - name: Compute checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "ax25 ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # For manual runs: print artifact locations instead of publishing.
      - name: Show artifact paths (manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "### Release packages (workflow_dispatch — not published)" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/*.tar.gz | awk '{print "- "$NF" ("$5")"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SHA256SUMS**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat dist/SHA256SUMS.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
