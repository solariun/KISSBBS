name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Ubuntu GCC
          - os: macos-latest
            name: macOS Clang

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtest-dev libsqlite3-dev pkg-config cmake
          # Build GoogleTest from source (Ubuntu ships headers only)
          cd /usr/src/gtest && sudo cmake . && sudo make && sudo cp lib/*.a /usr/lib/

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install googletest sqlite

      - name: Build all
        run: make all

      - name: Run tests
        run: make test
