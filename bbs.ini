; KISSBBS configuration file
; Copy and edit this file before running the BBS

[kiss]
device = /dev/ttyUSB0
baud   = 9600

[ax25]
callsign    = N0CALL-1
mtu         = 128
window      = 3
t1_ms       = 3000
t3_ms       = 60000
n2          = 10
txdelay     = 30
persist     = 63
; digipeaters = WIDE1-1,WIDE2-1

[bbs]
name             = MyBBS
beacon           = !0000.00N/00000.00W>KISSBBS AX.25 BBS
beacon_interval  = 600
welcome_script   = welcome.bas

[basic]
script_dir = .
database   = bbs.db
