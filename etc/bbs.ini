; KISSBBS configuration file
; Copy and edit this file before running the BBS

[kiss]
device = /dev/ttyUSB0
baud   = 9600

[ax25]
callsign    = N0CALL-1
mtu         = 128
window      = 3
t1_ms       = 3000
t3_ms       = 60000
n2          = 10
txdelay     = 30
persist     = 63
; digipeaters = WIDE1-1,WIDE2-1

[bbs]
name             = MyBBS
beacon           = !0000.00N/00000.00W>KISSBBS AX.25 BBS
beacon_interval  = 600
welcome_script   = welcome.bas

[basic]
script_dir = .
database   = bbs.db

; ── Command dispatch ──────────────────────────────────────────────────────────
; Each key is a command name the user can type at the BBS prompt.
; Value can be:
;   a .bas file path  → run with the BASIC interpreter
;   a shell command   → run with stdin/stdout piped; stderr goes to /tmp/bbs_cmd.log
;
; Arguments typed by the user are appended (quoted args supported).
; Pre-defined defaults (overridable here):
;   W     = w
;   PS    = ps aux
;   DIR   = ls -la
;   SHELL = /bin/sh
;
; Example custom entries:
[commands]
welcome = welcome.bas
email   = email.bas
shell   = /bin/bash
w       = w
ps      = ps aux
dir     = ls -la
